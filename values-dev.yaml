# values-dev.yaml - Entorno desarrollo completo Parcial
replicaCount: 1

# PostgreSQL (tag válido Bitnami)
postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  image:
    tag: "15.5.0-debian-12-r2"  # ← FIX válido [web:123]
  auth:
    postgresPassword: pedido123
    username: pedidos_user
    password: userpass123
    database: pedidos

# Backend Spring Petclinic REST (API real)
backend:
  image:
    repository: sczyh30/spring-petclinic-rest  # ← Spring Boot real
    tag: "2.6.0"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080
  dbHost: "{{ .Release.Name }}-postgresql"
  dbName: pedidos
  dbUser: pedidos_user
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Frontend nginx
frontend:
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# HPA Backend
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
