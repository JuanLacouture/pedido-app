apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pedido-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JuanLacouture/pedido-app.git
    targetRevision: HEAD
    path: charts/pedido-app
    helm:
      valueFiles:
      - values-prod.yaml  # ← Diferencia vs dev
  destination:
    server: https://kubernetes.default.svc
    namespace: pedido-prod  # ← Namespace prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
