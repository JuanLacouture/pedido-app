@"
# values-prod.yaml - Entorno producción
replicaCount: 3

# PostgreSQL prod
postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      size: 16Gi
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  image:
    tag: "15.5.0-debian-12-r2"
  auth:
    postgresPassword: pedido123
    username: pedidos_user
    password: userpass123
    database: pedidos

# Backend prod
backend:
  image:
    repository: sczyh30/spring-petclinic-rest
    tag: "2.6.0"
    pullPolicy: IfNotPresent
  replicas: 5
  port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Frontend prod
frontend:
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent
  replicas: 3
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Comunes
service:
  type: ClusterIP
ingress:
  enabled: true
  className: nginx

# HPA prod
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
"@ | Out-File charts/pedido-app/values-prod.yaml -Encoding UTF8
