replicaCount: 2

postgresql:
  enabled: false

db:
  username: "pedido"
  password: "pedido123"
  database: "pedidos"
  storage: "20Gi"

backend:
  image:
    repository: springcommunity/spring-petclinic-rest
    tag: "3.0.2"
    pullPolicy: Always
  replicas: 4
  port: 8080
  dbHost: "pedido-app-prod-postgresql"
  dbName: "pedidos"
  dbUser: "pedido"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

frontend:
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

service:
  type: ClusterIP

ingress:
  enabled: true
  className: nginx

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

ingress:
  enabled: true
  className: nginx
  host: "pedido-prod.local"