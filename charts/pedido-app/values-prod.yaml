replicaCount: 2

postgresql:
  enabled: false
  primary:
    persistence:
      enabled: true
      size: 20Gi                  # ← más storage en prod
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  auth:
    postgresPassword: "pedido123"
    username: "pedido"
    password: "pedido123"
    database: "pedidos"

backend:
  image:
    repository: sczyh30/spring-petclinic-rest
    tag: "2.6.0"
    pullPolicy: IfNotPresent
  replicas: 3                     # ← más réplicas en prod
  port: 8080
  dbHost: "pedido-app-prod-postgresql"  # ← nombre exacto del service en prod
  dbName: "pedidos"
  dbUser: "pedido"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

frontend:
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

service:
  type: ClusterIP

ingress:
  enabled: true
  className: nginx

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20                 # ← mayor escala en prod
  targetCPUUtilizationPercentage: 60
