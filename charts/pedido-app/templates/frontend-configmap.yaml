apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pedido-app.fullname" . }}-frontend-config
  labels:
    {{- include "pedido-app.labels" . | nindent 4 }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <title>Pedido App</title>
    </head>
    <body>
      <h1>Sistema de Gestion de Pedidos</h1>
      <button onclick="cargarPedidos()">Cargar Pedidos</button>
      <div id="status"></div>
      <table id="tabla" style="display:none">
        <thead><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Ciudad</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <script>
        function cargarPedidos() {
          fetch('/petclinic/api/owners')
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(data) {
              document.getElementById('status').innerHTML = 'Conectado: ' + data.length + ' registros';
              var html = '';
              data.forEach(function(p) {
                html += '<tr><td>'+p.id+'</td><td>'+p.firstName+'</td><td>'+p.lastName+'</td><td>'+p.city+'</td></tr>';
              });
              document.getElementById('tbody').innerHTML = html;
              document.getElementById('tabla').style.display = 'table';
            })
            .catch(function(err) { document.getElementById('status').innerHTML = 'Error: ' + err.message; });
        }
        cargarPedidos();
      </script>
    </body>
    </html>
  nginx.conf: |
    server {
      listen 80;
      server_name localhost;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /petclinic {
        proxy_pass http://{{ include "pedido-app.fullname" . }}-backend:{{ .Values.backend.port | default 9966 }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Basic YWRtaW46YWRtaW4=";
      }
    }