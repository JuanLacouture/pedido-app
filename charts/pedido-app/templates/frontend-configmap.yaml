apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pedido-app.fullname" . }}-frontend-config
  labels:
    {{- include "pedido-app.labels" . | nindent 4 }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <title>Pedido App</title>
      <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
        #status { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .ok { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
      </style>
    </head>
    <body>
      <h1>🛒 Sistema de Gestión de Pedidos</h1>
      <button onclick="cargarPedidos()">Cargar Pedidos</button>
      <div id="status"></div>
      <table id="tabla" style="display:none">
        <thead><tr><th>ID</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>

      <script>
        function cargarPedidos() {
          fetch('/petclinic/api/owners')   // ← cambia esta línea
            .then(r => {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.json();
            })
            .then(data => {
              const status = document.getElementById('status');
              status.className = 'ok';
              status.innerHTML = '✅ Backend conectado — ' + data.length + ' registro(s) encontrado(s)';
              const tbody = document.getElementById('tbody');
              tbody.innerHTML = '';
              data.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.id}</td><td>${p.firstName} ${p.lastName}</td><td>-</td><td>-</td></tr>`;
              });
              document.getElementById('tabla').style.display = 'table';
            })
            .catch(err => {
              const status = document.getElementById('status');
              status.className = 'error';
              status.innerHTML = '❌ Error al conectar con el backend: ' + err.message;
            });
        }
        cargarPedidos();
      </script>
    </body>
    </html>
