apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pedido-app.fullname" . }}-frontend
  labels:
    {{- include "pedido-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas | default 1 }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ .Values.frontend.port | default 80 }}
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        volumeMounts:
        - name: frontend-config
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        - name: frontend-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      volumes:
      - name: frontend-config
        configMap:
          name: {{ include "pedido-app.fullname" . }}-frontend-config