apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pedido-app.fullname" . }}-backend
spec:
  replicas: {{ .Values.backend.replicas | default .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ .Values.backend.port | default 80 }}
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://$(DB_HOST):5432/$(DB_NAME)
        - name: DB_HOST
          value: {{ .Values.backend.dbHost | default (printf "%s-postgresql" (include "pedido-app.fullname" .)) | quote }}
        - name: DB_NAME
          value: {{ .Values.db.database | default "pedidos" | quote }}
        - name: DB_USER
          value: {{ .Values.db.username | default "pedido" | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "pedido-app.fullname" . }}-db-secret
              key: db-password
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 10
