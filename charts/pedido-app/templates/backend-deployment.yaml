apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pedido-app.fullname" . }}-backend
  labels:
    {{- include "pedido-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas | default .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ .Values.backend.port | default 9966 }}
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://{{ include "pedido-app.fullname" . }}-postgresql:5432/{{ .Values.db.database | default "pedidos" }}"
        - name: SPRING_DATASOURCE_USERNAME
          value: {{ .Values.db.username | default "pedido" | quote }}
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "pedido-app.fullname" . }}-db-secret
              key: db-password
        - name: SPRING_PROFILES_ACTIVE
          value: "postgresql,spring-data-jpa"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "create"
        - name: SPRING_SQL_INIT_MODE
          value: "always"
        - name: SPRING_JPA_SHOW_SQL
          value: "true"
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /petclinic/api/vets
            port: {{ .Values.backend.port | default 9966 }}
          initialDelaySeconds: 90
          periodSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /petclinic/api/vets
            port: {{ .Values.backend.port | default 9966 }}
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 5
