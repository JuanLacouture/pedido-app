<!DOCTYPE html>
<html>
<head>
  <title>Pedido App</title>
</head>
<body>
  <h1>Pedido App GitOps ✅</h1>
  <h2>Backend Status</h2>
  <div id="backend-status">Cargando...</div>
  
  <script>
    fetch('/api/actuator/health')
      .then(r => r.json())
      .then(data => {
        document.getElementById('backend-status').innerHTML = 
          `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      })
      .catch(e => {
        document.getElementById('backend-status').innerHTML = 
          '❌ Backend no responde';
      });
  </script>
</body>
</html>
