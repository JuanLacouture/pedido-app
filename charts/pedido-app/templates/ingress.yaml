{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pedido-app.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: pedido.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ include "pedido-app.fullname" . }}-backend
            port:
              number: 8080
  - host: pedido.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "pedido-app.fullname" . }}-frontend
            port:
              number: {{ default 80 .Values.frontend.port }}
{{- end }}
