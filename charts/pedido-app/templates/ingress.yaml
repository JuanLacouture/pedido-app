{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pedido-app.fullname" . }}
  labels:
    {{- include "pedido-app.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
spec:
  rules:
  - host: pedido.local
    http:
      paths:
      - path: /petclinic
        pathType: Prefix
        backend:
          service:
            name: {{ include "pedido-app.fullname" . }}-backend
            port:
              number: {{ default 9966 .Values.backend.port }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "pedido-app.fullname" . }}-frontend
            port:
              number: {{ default 80 .Values.frontend.port }}
{{- end }}