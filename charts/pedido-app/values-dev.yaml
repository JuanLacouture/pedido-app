replicaCount: 1

postgresql:
  enabled: false

db:
  username: "pedido"
  password: "pedido123"
  database: "pedidos"
  storage: "8Gi"

backend:
  image:
    repository: springcommunity/spring-petclinic-rest
    tag: "3.0.2"
    pullPolicy: Always
  replicas: 2
  port: 9966
  dbHost: "pedido-app-dev-postgresql"
  dbName: "pedidos"
  dbUser: "pedido"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

frontend:
  frontend:
    backendService: "pedido-app-dev-backend"
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  type: ClusterIP

ingress:
  enabled: true
  className: nginx

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
